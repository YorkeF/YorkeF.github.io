<div class="ide-shell">

  <!-- Toolbar -->
  <div class="toolbar">

    <!-- Left: logo, menu, project, branch -->
    <div class="tb-left">
      <img class="tb-logo" src="logo.png" alt="YF" />
      <button class="tb-btn" title="Main Menu">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 3.5h10M2 7h10M2 10.5h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-crumb" title="Project">
        <span class="tb-badge">YF</span>
        <span>portfolio</span>
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
          <path d="M1.5 3L4 5.5L6.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="tb-crumb" title="Git Branch">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="3" cy="2.5" r="1.5" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="3" cy="9.5" r="1.5" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="9" cy="2.5" r="1.5" stroke="currentColor" stroke-width="1.1"/>
          <path d="M3 4v4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M9 4C9 6.5 3 6.5 3 9.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
        <span>main</span>
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
          <path d="M1.5 3L4 5.5L6.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Right: current file, run controls, search, settings, window controls -->
    <div class="tb-right">
      <button class="tb-crumb" title="Current File">
        <span>{{ activeFileName() ?? 'Current File' }}</span>
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
          <path d="M1.5 3L4 5.5L6.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-btn tb-run" title="Run">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M3 1.5L12 6.5L3 11.5V1.5Z" fill="#6aab73" stroke="#6aab73" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="tb-btn" title="Debug">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="8.5" r="4" stroke="currentColor" stroke-width="1.2"/>
          <path d="M5 4C5 2.9 5.9 2 7 2s2 .9 2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M7 5.5V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M2.5 7H4.5M9.5 7H11.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M4 2L2.5 1M10 2L11.5 1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Search Everywhere">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.3"/>
          <path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="tb-btn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/>
          <path d="M7 1.5V3M7 11V12.5M1.5 7H3M11 7H12.5M3.05 3.05l1.06 1.06M9.89 9.89l1.06 1.06M3.05 10.95l1.06-1.06M9.89 4.11l1.06-1.06" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-win-btn" title="Minimize" (click)="minimizeWindow()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M1 5.5h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="tb-win-btn" title="Maximize / Restore Fullscreen" (click)="maximizeWindow()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <rect x="1" y="1" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
      <button class="tb-win-btn tb-win-close" title="Close Tab" (click)="closeWindow()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M1.5 1.5l8 8M9.5 1.5l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- Main area -->
  <div class="main-area">

    <!-- Activity Bar -->
    <div class="activity-bar">
      <div class="ab-top">
        <button class="ab-btn" [class.active]="showProject()" title="Project" (click)="toggleProject()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1.5 4.5A1 1 0 0 1 2.5 3.5H5.88a1 1 0 0 1 .72.3l.9.9a1 1 0 0 0 .71.3H13.5a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H2.5a1 1 0 0 1-1-1V4.5z" stroke="currentColor" stroke-width="1.2" fill="none"/>
          </svg>
        </button>
        <button class="ab-btn" title="Bookmarks">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 2h8a1 1 0 0 1 1 1v10l-5-2.5L3 13V3a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.2" fill="none"/>
          </svg>
        </button>
        <button class="ab-btn" title="Structure">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="2" width="5" height="3" rx="0.5" stroke="currentColor" stroke-width="1.1"/>
            <rect x="9.5" y="6.5" width="5" height="3" rx="0.5" stroke="currentColor" stroke-width="1.1"/>
            <rect x="1.5" y="11" width="5" height="3" rx="0.5" stroke="currentColor" stroke-width="1.1"/>
            <path d="M6.5 3.5H8.5V8H6.5M6.5 12.5H8.5V8" stroke="currentColor" stroke-width="1.1" fill="none"/>
          </svg>
        </button>
      </div>
      <div class="ab-bottom">
        <button class="ab-btn" [class.active]="showTerminal()" title="Terminal" (click)="toggleTerminal()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="2.5" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M4.5 5.5L7.5 8 4.5 10.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 10.5h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Work area -->
    <div class="work-area">

      <!-- Top row: project panel + editor -->
      <div class="top-row">

        @if (showProject()) {
          <div class="project-panel" [style.width.px]="sidebarWidth()">
            <div class="panel-header">
              <span>Project</span>
            </div>
            <div class="panel-scroll">
              <app-file-tree></app-file-tree>
            </div>
          </div>
          <div class="vhandle" (mousedown)="onSidebarDragStart($event)"></div>
        }

        <!-- Editor column -->
        <div class="editor-col">
          <app-tab-bar></app-tab-bar>
          <div class="editor-wrap">
            <app-editor-panel></app-editor-panel>
          </div>
        </div>

      </div>

      <!-- Terminal — CSS-hidden to preserve state between toggles -->
      <div class="terminal-row" [class.hidden]="!showTerminal()">
        <div class="hhandle" (mousedown)="onTerminalDragStart($event)"></div>
        <div class="terminal-wrap" [style.height.px]="terminalHeight()">
          <app-terminal (requestHide)="showTerminal.set(false)"></app-terminal>
        </div>
      </div>

    </div>

    <!-- Right bar -->
    <div class="right-bar">
      <div class="rb-top">

        <!-- Notifications -->
        <button class="rb-btn" title="Notifications">
          <span class="rb-icon-wrap">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2a4.5 4.5 0 0 0-4.5 4.5v2.25L2 10.5h12l-1.5-1.75V6.5A4.5 4.5 0 0 0 8 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
              <path d="M6.5 10.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <span class="rb-dot"></span>
          </span>
        </button>

        <!-- Collaboration -->
        <button class="rb-btn" title="Collaboration">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/>
            <path d="M5 9.5C5 8 6 7 8 7s3 1 3 2.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            <circle cx="8" cy="5.5" r="1.3" stroke="currentColor" stroke-width="1.1"/>
          </svg>
        </button>

        <!-- Database -->
        <button class="rb-btn" title="Database">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <ellipse cx="8" cy="4.5" rx="4.5" ry="1.8" stroke="currentColor" stroke-width="1.2"/>
            <path d="M3.5 4.5v3c0 1 2 1.8 4.5 1.8s4.5-.8 4.5-1.8v-3" stroke="currentColor" stroke-width="1.2"/>
            <path d="M3.5 7.5v3c0 1 2 1.8 4.5 1.8s4.5-.8 4.5-1.8v-3" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>

      </div>
    </div>

  </div>

  <!-- Status Bar -->
  <app-status-bar></app-status-bar>

</div>
