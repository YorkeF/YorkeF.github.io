<div class="status-bar">

  <!-- Left: breadcrumb path -->
  <div class="status-left">
    @if (breadcrumbs().length) {
      <span class="status-item breadcrumb">
        <svg class="repo-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="3" cy="2" r="1.3" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="3" cy="11" r="1.3" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="10" cy="2" r="1.3" stroke="currentColor" stroke-width="1.1"/>
          <path d="M3 3.3v6.4M3 9C3 7 6 6.5 8.5 6.5H8.7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
        @for (crumb of breadcrumbs(); track crumb; let last = $last) {
          @if (!last) {
            <span class="crumb-seg">{{ crumb }}</span>
            <span class="crumb-arrow">›</span>
          } @else {
            <span class="crumb-seg crumb-file">
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                <rect x="1" y="1" width="7" height="9" rx="1" stroke="currentColor" stroke-width="1"/>
                <path d="M3 4h4M3 6h4M3 8h2" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
              </svg>
              {{ crumb }}
            </span>
          }
        }
      </span>
    }
  </div>

  <!-- Right: file metadata -->
  <div class="status-right">
    @if (activeFileName()) {
      <span class="status-item">Markdown</span>
      <span class="status-sep"></span>
    }
    <span class="status-item">UTF-8</span>
    <span class="status-sep"></span>
    <span class="status-item">LF</span>
    <span class="status-sep"></span>
    <span class="status-item">Ln 1, Col 1</span>
  </div>

</div>
